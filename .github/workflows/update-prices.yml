name: Update Azure VM Pricing

on:
  schedule:
    # Run every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch: # Allow manual runs

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest prices from Azure Retail Prices API
        shell: pwsh
        run: ./scripts/fetch-prices.ps1

      - name: Commit and push if prices changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          if git diff --cached --quiet; then
            echo "No pricing changes detected."
          else
            git commit -m "chore: update VM pricing from Azure Retail Prices API [$(date -u +%Y-%m-%d)]"
            git push
          fi
